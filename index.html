let usuario=null;
const dados=[];

async function login(){
  console.log("tentando logar...");

  const res = await fetch('https://manhattan-backend-y7ul.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      user: user.value,
      pass: pass.value
    })
  });

  const r = await res.json();

  if(!r.ok){
    alert(r.erro);
    return;
  }

  usuario = r.usuario;
  localStorage.setItem('u',usuario);
  mostrar();
}

function logout(){
usuario=null;
localStorage.removeItem('u');
mostrar();
}

function mostrar(){
  const loginDiv = document.getElementById('login');
  const appDiv = document.getElementById('app');

  if (!loginDiv || !appDiv) {
    console.error("Elemento não encontrado");
    return;
  }

  loginDiv.style.display=usuario?'none':'block';
  appDiv.style.display=usuario?'block':'none';

  if(usuario) 
    userInfo.innerText='Usuário: '+usuario;
}

async function validarCodigo(){
  const codigo = codigoInput.value;

// try{
  const res=await fetch('https://manhattan-backend-y7ul.onrender.com/validar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      tipo,
      numero: numeroInput.value,
      codigoBarras: codigo,
      usuario
    })
  });

  const r = await res.json();

  const msg = document.getElementById('mensagem');
  const somErro = document.getElementById('somErro');
  const somOk = document.getElementById('somOk');

  if(r.valido){
    msg.innerText = "✔ Código válido";
    msg.style.color = "green";
    somOk.play();
  } else {
    msg.innerText = "❌ " + r.erro;
    msg.style.color = "red";
    somErro.play();
  }

  // 🔥 LIMPAR CAMPO
  codigoInput.value = "";

  // 🔥 FOCO AUTOMÁTICO
  codigoInput.focus();

}
