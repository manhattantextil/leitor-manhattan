<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007BFF">
<link rel="manifest" href="manifest.json">
<title>Leitor Manhattan</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{
  font-family:Arial;
  margin:0;
  background:#121212;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
  background:#1e1e1e;
  min-height:100vh;
}

*{
  box-sizing:border-box;
}

input, button{
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

input{
  background:#2a2a2a;
  color:#fff;
  border:1px solid #444;
}

input::placeholder{
  color:#aaa;
}

button{
  background:#000;
  color:#fff;
  border:1px solid #555;
}

button:active{
  transform:scale(0.98);
}

/* BOTÕES TIPO (entrada/saída) */
.tipoBtn{
  flex:1;
  padding:15px;
  font-size:16px;
  border:2px solid #555;
  background:#2a2a2a;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.tipoBtn.ativo{
  background:#fff;
  color:#000;
}

</style>
</head>
<body>

<div class="container" id="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="container" id="app" style="display:none">
<h2 id="userInfo"></h2>

<div id="tipoContainer" style="display:flex; gap:10px; margin-top:10px;">
  
  <button type="button" class="tipoBtn ativo" data-value="saida">
    📦 Pedido
  </button>

  <button type="button" class="tipoBtn" data-value="entrada">
    🧾 Ordem de Compra
  </button>

</div>

<input id="numeroInput" placeholder="Pedido / OC" inputmode="numeric" pattern="[0-9]*">
<input id="codigoInput" placeholder="Código de Barras" inputmode="numeric" maxlength="15" pattern="[0-9]*" style="font-size:18px; font-weight:bold;">
<div id="mensagem" style="margin-top:10px;font-weight:bold;"></div>
<div id="ultimoCodigo" style="margin-top:10px; font-size:14px; color:#aaa;">
  Última etiqueta lida: 
</div>

<button onclick="validarCodigo()">✅ Validar</button>
<button onclick="camera()">📷 Câmera</button>
<button onclick="logout()">🚪 Sair</button>

<audio id="somOk">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<audio id="somErro" preload="auto">
  <source src="sounds/ai_pai_para.mp3" type="audio/mpeg">
</audio>

<script>

  let tipoSelecionado = "saida";

  document.querySelectorAll('.tipoBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      
      document.querySelectorAll('.tipoBtn').forEach(b => b.classList.remove('ativo'));
      
      btn.classList.add('ativo');
      
      tipoSelecionado = btn.dataset.value;
    });
  });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
  }

  let usuario=null;
  const dados=[];

  async function login(){
    console.log("tentando logar...");

    const res = await fetch('https://manhattan-backend-y7ul.onrender.com/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        user: user.value,
        pass: pass.value
      })
    });

    const r = await res.json();

    if(!r.ok){
      alert(r.erro);
      return;
    }

    usuario = r.usuario;
    localStorage.setItem('u',usuario);
    mostrar();
  }

  function logout(){
    usuario=null;
    localStorage.removeItem('u');
    mostrar();
  }

  function mostrar(){
    
    const loginDiv = document.getElementById('login');
    const appDiv = document.getElementById('app');

    if (!loginDiv || !appDiv) {
      console.error("Elemento não encontrado");
      return;
    }

    loginDiv.style.display=usuario?'none':'block';
    appDiv.style.display=usuario?'block':'none';

    if(usuario) 
      userInfo.innerText='bem vindo, '+usuario;
  }

  async function validarCodigo(){
    const codigo = codigoInput.value;
    const msg = document.getElementById('mensagem');

    // valida tamanho
    if(codigo.length !== 15){
      msg.innerText = "❌ Código deve ter 15 dígitos";
      msg.style.color = "red";

      const somErro = document.getElementById('somErro');
      somErro.currentTime = 0;
      somErro.play();

      codigoInput.focus();
      return;
    }

    const res=await fetch('https://manhattan-backend-y7ul.onrender.com/validar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tipo: tipoSelecionado,
        numero: numeroInput.value,
        codigoBarras: codigo,
        usuario: user.value
      })
    });

    const ultimo = document.getElementById('ultimoCodigo');
    ultimo.innerText = "última etiqueta lida: " + codigo;

    const r = await res.json();

    const somErro = document.getElementById('somErro');
    const somOk = document.getElementById('somOk');

    if(r.valido){
      msg.innerText = "✔ Código válido";
      msg.style.color = "green";

      somOk.currentTime = 0;
      somOk.play();

    } else {
      msg.innerText = "❌ " + r.erro;
      msg.style.color = "red";

      somErro.currentTime = 0;
      somErro.play();

      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
      }
    }

    // 🔥 LIMPAR CAMPO
    codigoInput.value = "";

    // 🔥 FOCO AUTOMÁTICO
    codigoInput.focus();

  }

  function camera(){
    const qr=new Html5Qrcode('hist');
    qr.start({facingMode:'environment'},{fps:10},txt=>{
    qr.stop();
    validar(txt);
    });
  }

  ['di','df','status','fCod','fNum'].forEach(id=>{
    document.addEventListener('input',e=>{if(e.target.id===id)filtrar();});
  });

  window.onload=()=>{
    usuario=localStorage.getItem('u');
    mostrar();
  }

  codigoInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      validarCodigo();
    }
  });

</script>

</body>
</html>
